api_version: 1.0


id: boostsecurityio/safety
name: Safety
namespace: boostsecurityio/safety
scan_types:
  - sca


config:
  support_diff_scan: true
  include_files:
    - requirements.txt

steps:
  - scan:
      command:
        docker:
          image: public.ecr.aws/docker/library/python:3.11.0-alpine3.16@sha256:2a068b9442f61f4480306d44e3b166bfe3343761e9bd57c38f66302ebf28fd9e
          command: |
            sh -c 'pip install --quiet safety==2.3.5 2>/dev/null && python -m safety check --json --continue-on-error -r "$REQUIREMENTS_TXT"'
          workdir: /src
          environment:
            HOME: /tmp
            REQUIREMENTS_TXT: ${REQUIREMENTS_TXT:-requirements.txt}
            SAFETY_API_KEY: ${SAFETY_API_KEY:-}
      format: sarif
      post-processor:
        docker:
            image: ghcr.io/boostsecurityio/scanner-publishing/boost-converter-sca:6dda157@sha256:4c5efbeb02675e75703e376d4a916f7e1c8ec317f75b14cd57205497d9a2f9de
            command: |
              process --scanner safety
            environment:
                PYTHONIOENCODING: utf-8
