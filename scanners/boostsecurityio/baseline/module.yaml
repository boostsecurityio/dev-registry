api_version: 1.0


id: boostsecurityio/baseline
name: BoostSecurity Scanner
namespace: boostsecurityio/baseline
scan_types:
  - sast
  - cicd


config:
  support_diff_scan: true
  include_files:
    - "*.crx"
    - "*.deb"
    - "*.dex"
    - "*.dey"
    - "*.elf"
    - "*.o"
    - "*.so"
    - "*.iso"
    - "*.class"
    - "*.jar"
    - "*.bundle"
    - "*.dylib"
    - "*.lib"
    - "*.msi"
    - "*.dll"
    - "*.drv"
    - "*.efi"
    - "*.exe"
    - "*.ocx"
    - "*.pyc"
    - "*.pyo"
    - "*.par"
    - "*.rpm"
    - "*.whl"

steps:
    - scan:
        command:
          docker:
            image: public.ecr.aws/boostsecurityio/boost-scanner-native:576779b@sha256:ba38797b76a669bcbd9d1f4d50c49ddbd0f375d906a26a9396a6825eae458eaf
            command: scanner scan
            workdir: /src
          name: scanner
        format: sarif
