api_version: 1.0


id: boostsecurityio/baseline
name: BoostSecurity Scanner
namespace: boostsecurityio/baseline
scan_types:
  - sast
  - cicd


config:
  support_diff_scan: true
  include_files:
    - "*.crx"
    - "*.deb"
    - "*.dex"
    - "*.dey"
    - "*.elf"
    - "*.o"
    - "*.so"
    - "*.iso"
    - "*.class"
    - "*.jar"
    - "*.bundle"
    - "*.dylib"
    - "*.lib"
    - "*.msi"
    - "*.dll"
    - "*.drv"
    - "*.efi"
    - "*.exe"
    - "*.ocx"
    - "*.pyc"
    - "*.pyo"
    - "*.par"
    - "*.rpm"
    - "*.whl"

steps:
    - scan:
        command:
          docker:
            image: public.ecr.aws/boostsecurityio/boost-scanner-native:6b6cf90@sha256:285e3bd9b11cf47c5e28d501eca0dd70a139f8c02ec1d9a469ba69d3d77dd8f9
            command: scanner scan
            workdir: /src
          name: scanner
        format: sarif
