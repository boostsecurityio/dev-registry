api_version: 1.0

id: boostsecurityio/composition
name: BoostSecurity Composition Scanner
namespace: boostsecurityio/composition
scan_types:
  - metadata
  - sci

config:
  support_diff_scan: false
  support_mono_repo: false
  require_full_repo: true

steps:
  - scan:
      format: metadata
      command:
        docker:
          image: public.ecr.aws/boostsecurityio/boost-scanner-composition:bf99e08@sha256:7e860c799e4393a5bccad0e556b869d8fd23b9f55a2a2a7ce04b37a41886c4d9
          command: scan
          workdir: /src
          environment:
            XDG_CONFIG_HOME: /tmp
