api_version: 1.0

id: boostsecurityio/composition
name: BoostSecurity Composition Scanner
namespace: boostsecurityio/composition
scan_types:
  - metadata
  - sci

config:
  support_diff_scan: false
  support_mono_repo: false
  require_full_repo: true

steps:
  - scan:
      format: metadata
      command:
        docker:
          image: ghcr.io/boostsecurityio/scanner-publishing/boost-scanner-composition:028363c@sha256:b83e2a8d516c15134db261080fb0e61ed9d7c3e14a9fe5e0b21ec9fc64347536
          command: scan
          workdir: /src
          environment:
            XDG_CONFIG_HOME: /tmp
