api_version: 1.0

id: boostsecurityio/trivy-image
name: Trivy (Image scanning)
namespace: boostsecurityio/trivy-image
scan_types:
  - secrets
  - sca_container

config:
  require_full_repo: true
  support_diff_scan: true

setup:
  - name: download trivy
    environment:
      VERSION: 0.69.2
      LINUX_X86_64_SHA: 65b5755bbc851699be0286b453b51c3b1f139a8c1ce731f444210eeaf9a1aa61
      LINUX_ARM64_SHA: 524e496954c761ce5cd9c92baf2f7c2180958015bc25edad31570e102592a37c
      MACOS_ARM64_SHA: 28243bee903a5e00fe9074baeb9e57c51ae05514261a53da66ef7f2cc0b352f9
    run: |
      BINARY_URL="https://assets.build.boostsecurity.io/scanners/trivy/trivy-${VERSION}"
      ARCH=$(uname -m)

      case "$(uname -sm)" in
        "Linux x86_64")
          BINARY_URL="${BINARY_URL}/linux/amd64/trivy.gz"
          SHA="${LINUX_X86_64_SHA} trivy.gz"
          ;;
        "Linux aarch64")
          BINARY_URL="${BINARY_URL}/linux/arm64/trivy.gz"
          SHA="${LINUX_ARM64_SHA} trivy.gz"
          ;;
        "Darwin arm64")
          BINARY_URL="${BINARY_URL}/darwin/arm64/trivy.gz"
          SHA="${MACOS_ARM64_SHA} trivy.gz"
          ;;
        *)
          echo "Unsupported machine: ${OPTARG}"
          exit 1
          ;;
      esac

      curl -o trivy.gz -fsSL "${BINARY_URL}"
      echo "${SHA}" | sha256sum --check

      gunzip trivy.gz
      chmod +x trivy

steps:
  - scan:
      command:
        environment:
          IMAGE_NAME: ${BOOST_IMAGE_NAME}
          TRIVY_ADDITIONAL_ARGS: ${TRIVY_ADDITIONAL_ARGS---ignore-unfixed}
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db:2,ghcr.io/aquasecurity/trivy-db:2
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db:1,ghcr.io/aquasecurity/trivy-java-db:1
          TRIVY_SCANNERS: vuln,secret
        run: >
          $SETUP_PATH/trivy image 
          ${TRIVY_ADDITIONAL_ARGS} 
          --format json 
          --scanners ${TRIVY_SCANNERS}
          --skip-version-check 
          --quiet 
          ${BOOST_IMAGE_NAME}
      format: sarif
      post-processor:
        docker:
          image: public.ecr.aws/boostsecurityio/boost-scanner-trivy:0269f97@sha256:9b9f2900aef1adfe2cf54a8a0ecc912bdb24c23c94970430b636f92075af586c
          command: process
          workdir: /code
          environment:
            PYTHONIOENCODING: utf-8
            DOCKERFILE_PATH: ${BOOST_DOCKERFILE_PATH:-}
