api_version: 1.0


id: boostsecurityio/nancy
name: Nancy
namespace: boostsecurityio/nancy
scan_types:
  - sca


config:
  support_diff_scan: true
  include_files:
    - .nancy-ignore
    - Gopkg.lock
    - Gopkg.toml

setup:
  - name: Download Nancy
    environment:
      VERSION: 1.0.46
      LINUX_X86_64_SHA: 3cbbc1e88ed754255a12face312832bf7af9ed1cc13a50eaf69cfa759d3d65f0
      LINUX_ARM64_SHA: 618810dfd654f2eaa64a516a5b6181f181755573a5a484012a2bef3ab857f478
      MACOS_ARM64_SHA: ab60af4228a15468ee710bf2a92cb5e05c21d55a83698aebec4f29028c9d3c66
    run: |
      BINARY_URL="https://assets.build.boostsecurity.io/scanners/nancy/nancy-${VERSION}"
      ARCH=$(uname -m)

      case "$(uname -sm)" in
        "Linux x86_64")
          BINARY_URL="${BINARY_URL}/linux/amd64/nancy.gz"
          SHA="${LINUX_X86_64_SHA} nancy.gz"
          ;;
        "Linux aarch64")
          BINARY_URL="${BINARY_URL}/linux/arm64/nancy.gz"
          SHA="${LINUX_ARM64_SHA} nancy.gz"
          ;;
        "Darwin arm64")
          BINARY_URL="${BINARY_URL}/darwin/arm64/nancy.gz"
          SHA="${MACOS_ARM64_SHA} nancy.gz"
          ;;
        *)
          echo "Unsupported machine: ${OPTARG}"
          exit 1
          ;;
      esac

      curl -o nancy.gz -fsSL "${BINARY_URL}"
      echo "${SHA}" | sha256sum --check

      gunzip nancy.gz
      chmod +x nancy

steps:
  - scan:
      command:
        run: |
          if [ -f "$GOPKG_LOCK" ]; then
            $SETUP_PATH/nancy sleuth --path "$GOPKG_LOCK" --output json --quiet $NANCY_ARGS || true
          elif [ -f "$GO_LIST_PATH" ]; then
            cat "$GO_LIST_PATH" | $SETUP_PATH/nancy sleuth --output json --quiet $NANCY_ARGS || true
          else
            go list -e -json -deps ./... | $SETUP_PATH/nancy sleuth --output json --quiet $NANCY_ARGS || true
          fi
        environment:
          OSSI_USERNAME: ${OSSI_USERNAME:-}
          OSSI_TOKEN: ${OSSI_TOKEN:-}
          NANCY_ARGS: ${NANCY_ARGS:-}
          GOPKG_LOCK: ${GOPKG_LOCK:-Gopkg.lock}
          GO_LIST_PATH: ${GO_LIST_PATH:-.nancy-go-list.json}
      format: sarif
      post-processor:
        docker:
            image: public.ecr.aws/boostsecurityio/boost-converter-sca:6e4b6c1@sha256:417c90b672b016b01dac84a4cf24d3a042503b6ddcfd1ba22ebd24d229f78883
            command: process --scanner nancy
            environment:
                PYTHONIOENCODING: utf-8
