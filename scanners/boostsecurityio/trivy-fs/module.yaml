api_version: 1.0

id: boostsecurityio/trivy-fs
name: Trivy (Filesystem scanning)
namespace: boostsecurityio/trivy-fs
scan_types:
  - sca

config:
  require_full_repo: true
  support_diff_scan: true
  support_incremental: true
  include_files:
    # C/C++ https://trivy.dev/v0.61/docs/coverage/language/c/
    - conan.lock
    # Dart https://trivy.dev/v0.61/docs/coverage/language/dart/
    - pubspec.lock
    # Dotnet https://trivy.dev/v0.61/docs/coverage/language/dotnet/
    - "*.deps.json"
    - packages.config
    - "*Packages.props"
    - packages.lock.json
    # Elixir https://trivy.dev/v0.61/docs/coverage/language/elixir/
    - mix.lock
    # Go https://trivy.dev/v0.61/docs/coverage/language/golang/
    - go.mod
    # Java https://trivy.dev/v0.61/docs/coverage/language/java/
    - "*gradle.lockfile"
    - pom.xml
    - "*.sbt.lock"
    # NodeJs https://trivy.dev/v0.61/docs/coverage/language/nodejs/
    - package-lock.json
    - yarn.lock
    - pnpm-lock.yaml
    # Php https://trivy.dev/v0.61/docs/coverage/language/php/
    - composer.lock
    - installed.json
    # Python https://trivy.dev/v0.61/docs/coverage/language/python/
    - Pipfile.lock
    - requirements.txt
    - poetry.lock
    - uv.lock
    # Ruby https://trivy.dev/v0.61/docs/coverage/language/ruby/
    - Gemfile.lock
    - .gemspec
    # RUST https://trivy.dev/v0.61/docs/coverage/language/rust/
    - Cargo.lock
    # Swift https://trivy.dev/v0.61/docs/coverage/language/swift/
    - Package.resolved
    - Podfile.lock
    # Julia https://trivy.dev/v0.61/docs/coverage/language/julia/
    - Manifest.toml

setup:
  - name: Utility scripts
    run: |
      mkdir -p $SETUP_PATH/pre-scan-checks/
      cp $REGISTRY_MODULE_PATH/prescan_checks.sh $SETUP_PATH/pre-scan-checks/trivy
  - name: download trivy
    environment:
      VERSION: 0.69.2
      LINUX_X86_64_SHA: 65b5755bbc851699be0286b453b51c3b1f139a8c1ce731f444210eeaf9a1aa61
      LINUX_ARM64_SHA: 524e496954c761ce5cd9c92baf2f7c2180958015bc25edad31570e102592a37c
      MACOS_ARM64_SHA: 28243bee903a5e00fe9074baeb9e57c51ae05514261a53da66ef7f2cc0b352f9
    run: |
      BINARY_URL="https://assets.build.boostsecurity.io/scanners/trivy/trivy-${VERSION}"
      ARCH=$(uname -m)

      case "$(uname -sm)" in
        "Linux x86_64")
          BINARY_URL="${BINARY_URL}/linux/amd64/trivy.gz"
          SHA="${LINUX_X86_64_SHA} trivy.gz"
          ;;
        "Linux aarch64")
          BINARY_URL="${BINARY_URL}/linux/arm64/trivy.gz"
          SHA="${LINUX_ARM64_SHA} trivy.gz"
          ;;
        "Darwin arm64")
          BINARY_URL="${BINARY_URL}/darwin/arm64/trivy.gz"
          SHA="${MACOS_ARM64_SHA} trivy.gz"
          ;;
        *)
          echo "Unsupported machine: ${OPTARG}"
          exit 1
          ;;
      esac

      curl -o trivy.tgz -fsSL "${BINARY_URL}"
      echo "${SHA}" | sha256sum --check

      gunzip trivy.gz
      chmod +x trivy

steps:
  - run: $SETUP_PATH/pre-scan-checks/trivy
  - scan:
      command:
        environment:
          NO_COLOR: "true"
          TRIVY_ADDITIONAL_ARGS: ${TRIVY_ADDITIONAL_ARGS---ignore-unfixed}
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db:2,ghcr.io/aquasecurity/trivy-db:2
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db:1,ghcr.io/aquasecurity/trivy-java-db:1
          TRIVY_SCANNERS: vuln
        run: >
          $SETUP_PATH/trivy fs 
          ${TRIVY_ADDITIONAL_ARGS} 
          --format json
          --no-progress
          --scanners ${TRIVY_SCANNERS}
          --skip-version-check 
          . 2>&1
      format: sarif
      post-processor:
        docker:
          image: public.ecr.aws/boostsecurityio/boost-scanner-trivy:0269f97@sha256:9b9f2900aef1adfe2cf54a8a0ecc912bdb24c23c94970430b636f92075af586c
          command: process
          environment:
            PYTHONIOENCODING: utf-8
