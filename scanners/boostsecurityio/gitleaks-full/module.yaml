api_version: 1.0

id: boostsecurityio/gitleaks-full
name: Gitleaks Git Scan
namespace: boostsecurityio/gitleaks-full
scan_types:
  - secrets

config:
  support_diff_scan: false
  require_full_history: true

setup:
- name: Download Gitleaks
  environment:
    VERSION: 8.28.0
    LINUX_X86_64_SHA: f633b7152951fa251da6e933e3cae70077d1f85320f831f816f0673c524ddc0d
    LINUX_ARM64_SHA: eb19f13e443b1fa9d76ab53a56469d2ccd91d578f0ac42b2b3ba97e6496c7a73
    MACOS_ARM64_SHA: 2dd5c3747f5ad7e59569306520d124a7719d4521c47dda0a501cf91c45130542
  run: |
    BINARY_URL="https://assets.build.boostsecurity.io/scanners/gitleaks/gitleaks-${VERSION}"
    ARCH=$(uname -m)

    case "$(uname -sm)" in
      "Linux x86_64")
        BINARY_URL="${BINARY_URL}/linux/amd64/gitleaks.gz"
        SHA="${LINUX_X86_64_SHA} gitleaks.gz"
        ;;
      "Linux aarch64")
        BINARY_URL="${BINARY_URL}/linux/arm64/gitleaks.gz"
        SHA="${LINUX_ARM64_SHA} gitleaks.gz"
        ;;
      "Darwin arm64")
        BINARY_URL="${BINARY_URL}/darwin/arm64/gitleaks.gz"
        SHA="${MACOS_ARM64_SHA} gitleaks.gz"
        ;;
      *)
        echo "Unsupported machine: ${OPTARG}"
        exit 1
        ;;
    esac

    curl -o gitleaks.gz -fsSL "${BINARY_URL}"
    echo "${SHA}" | sha256sum --check

    gunzip gitleaks.gz
    chmod +x gitleaks
    
- name: Copy Boost Gitleaks Rules
  run: |
      cp $REGISTRY_PATH/scanners/boostsecurityio/gitleaks/boost.toml $SETUP_PATH/

steps:
  - scan:
      format: sarif
      command:
        environment:
          GITLEAKS_CONFIG: ${GITLEAKS_CONFIG:-}
        run: |
          [ -z "$GITLEAKS_CONFIG" ] && [ -z "$GITLEAKS_CONFIG_TOML" ] && [ ! -f ".gitleaks.toml" ] && cp $SETUP_PATH/boost.toml .gitleaks.toml || true
          $SETUP_PATH/gitleaks git --no-banner --exit-code 0 --report-format sarif --report-path $SETUP_PATH/gitleaks-output.sarif -l error .
          cat $SETUP_PATH/gitleaks-output.sarif
      post-processor:
        - docker:
            command: process --git-scan
            image: public.ecr.aws/boostsecurityio/boost-scanner-gitleaks:ff4b104@sha256:7d640ad96bf86fb1f3bd7d57deb71bcc98ad850cbdc7d9d10c865ca873715af7
        - docker:
            command: process --gitleaks-full
            image: public.ecr.aws/boostsecurityio/boost-scanner-keyscope:458e3dd@sha256:6b611b085271e2c8ed15590f536fd4a29221a11752ef7525bbb60be9ad241902
            environment:
              VALIDATE_SECRET: ${GITLEAKS_VALIDATE_SECRETS:-}
